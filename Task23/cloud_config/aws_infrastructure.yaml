AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for Student Management System infrastructure.

Resources:
  StudentS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: student-management-docs-storage
      VersioningConfiguration:
        Status: Enabled

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  StudentLaunchConfig:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: ami-0c55b159cbfafe1f0 # Example AMI ID (Amazon Linux 2)
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref InstanceSecurityGroup

  StudentASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AvailabilityZones: !GetAZs ''
      LaunchConfigurationName: !Ref StudentLaunchConfig
      MinSize: '1'
      MaxSize: '3'
      DesiredCapacity: '2'

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref StudentS3Bucket
